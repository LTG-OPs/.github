# =============================================================================
# Pull Request Labeler Workflow
# Organisation: LTG-OPs
# Repo:         .github (organisationsweit)
# Erstellt:     2026-03-25
#
# Docs: https://github.com/actions/labeler
# =============================================================================

name: "Pull Request Labeler"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR
        uses: actions/labeler@v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          sync-labels: true          # Schritt 3: Labels werden bei Revert automatisch entfernt
